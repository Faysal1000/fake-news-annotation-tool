name: Build Annotator Executables

# ============================================================================
# TRIGGER: Runs when you push a tag like v1.0.0, or manually from GitHub UI
# ============================================================================
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    # ========================================================================
    # MATRIX: Build on Windows, macOS (Intel + ARM), and Linux simultaneously
    # ========================================================================
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: FakeNewsAnnotator-Windows.exe
            pyinstaller_args: ""
          - os: macos-13        # Intel Mac (x86_64)
            artifact_name: FakeNewsAnnotator-macOS-Intel
            pyinstaller_args: ""
          - os: macos-latest    # Apple Silicon (ARM64)
            artifact_name: FakeNewsAnnotator-macOS-AppleSilicon
            pyinstaller_args: ""
          - os: ubuntu-latest
            artifact_name: FakeNewsAnnotator-Linux
            pyinstaller_args: ""

    runs-on: ${{ matrix.os }}

    steps:
      # --- Step 1: Check out the repository code ---
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Step 2: Set up Python 3.12 ---
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # --- Step 3: Install Linux display dependencies (needed for tkinter) ---
      - name: Install Linux display dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      # --- Step 4: Install Python dependencies + PyInstaller ---
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # --- Step 5: Build the standalone single-file executable ---
      # --onefile:    Packs everything into ONE file (no folders needed)
      # --windowed:   No console window (it's a GUI app)
      # --noconfirm:  Overwrite without asking
      # --clean:      Fresh build every time
      - name: Build executable
        run: python -m PyInstaller --name FakeNewsAnnotator --onefile --windowed --noconfirm --clean annotator_tool.py

      # --- Step 6: Rename the output to a descriptive platform-specific name ---
      - name: Rename output (Windows)
        if: runner.os == 'Windows'
        run: |
          move dist\FakeNewsAnnotator.exe "dist\${{ matrix.artifact_name }}"

      - name: Rename output (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          mv dist/FakeNewsAnnotator "dist/${{ matrix.artifact_name }}"

      # --- Step 7: Make executable on Unix systems ---
      - name: Make executable
        if: runner.os != 'Windows'
        run: chmod +x "dist/${{ matrix.artifact_name }}"

      # --- Step 8: Upload the built executable as a GitHub artifact ---
      # This makes it downloadable from the Actions tab even without a release.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 90

  # ==========================================================================
  # RELEASE: Create a GitHub Release with all executables attached
  # ==========================================================================
  release:
    needs: build
    runs-on: ubuntu-latest
    # Only create a release when a version tag is pushed (not manual runs)
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      # --- Download all built artifacts ---
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      # --- Create a GitHub Release and attach all executables ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Fake News Annotator ${{ github.ref_name }}"
          body: |
            ## 📰 Fake News Dataset Annotator

            Download the file for your operating system, place it anywhere, and **double-click to run**.
            No installation required — the app creates its data files in the same folder.

            | File | Platform |
            |------|----------|
            | `FakeNewsAnnotator-Windows.exe` | Windows 10/11 (64-bit) |
            | `FakeNewsAnnotator-macOS-AppleSilicon` | macOS (Apple M1/M2/M3/M4) |
            | `FakeNewsAnnotator-macOS-Intel` | macOS (Intel) |
            | `FakeNewsAnnotator-Linux` | Ubuntu / Debian / Fedora |

            ### How to use
            1. Download the file for your OS
            2. Place it in a folder (e.g. Desktop, or a dedicated project folder)
            3. Double-click to run (macOS: right-click → Open if blocked by Gatekeeper)
            4. The app will create `dataset.csv`, `images/` folder, and config next to the executable
          files: artifacts/**/*
          draft: false
          prerelease: false
